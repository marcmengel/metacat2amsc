
[general]
timestamp_file=.migrator_last_run
lock_file=.migrator_lock

# AMSC catalog info
# if you need an ssh tunnel to reach the amsc interface:
#tunnel_commmand=ssh -x -L8000:127.0.0.1:8000 amsc_gw_host.fnal.gov sleep 3000 &
amsc_url=http://127.0.0.1:8000
catalog_name=MyCatalog
update_by_delete_add=false
 
# this should be in an amsc sectio with the above
[openmetadata]
jwt_token: asdfasdfasdf..

# list of query stanzas below to go through
# query_list=metacat

# or if no query_list, we search metacat for namespaces and use templates
namespace_skip_pat=test
file_query_template=files where namespace="{namespace}" and  AmSC.common.type in ("artifact","mlModel") 
dataset_query_template=datasets matching {namespace}:* having AmSC.common.type in ('scientificWork','artifactCollection') 

[metacat]
server_url=https://metacat.domain:port/amsc_meta_prod/app
auth_server_url=https://metacat.domain:port/auth/amsc

